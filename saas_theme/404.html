{% extends "base.html" %}

{% block body_class %}page error-page{% endblock %}

{% block content %}
<div class="error-layout">
  <div class="error-content">
    <div class="error-code gradient-text">404</div>
    <h1 class="error-title">Page not found</h1>
    <p class="error-desc">Sorry, we couldn't find the page you're looking for. It may have been moved or deleted.</p>
    <div class="error-actions">
      <a href="{{ nav.homepage.url | url }}" class="btn-primary">Go back home</a>
      <a href="{{ nav.pages[0].url | url if nav.pages else '#' }}" class="btn-ghost">Browse docs</a>
    </div>
  </div>
</div>
{% endblock %}
