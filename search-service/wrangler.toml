name = "clairify-search"
main = "worker.js"
compatibility_date = "2025-03-01"

[[containers]]
class_name = "SearchService"
image = "./Dockerfile"
max_instances = 3

[[durable_objects.bindings]]
name = "SEARCH_SERVICE"
class_name = "SearchService"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SearchService"]
